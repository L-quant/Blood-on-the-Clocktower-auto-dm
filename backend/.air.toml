# Air 热重载配置
# 文档: https://github.com/air-verse/air
# 修改 .go 文件后自动重编译重启后端，无需手动操作

root = "."
tmp_dir = "tmp"

[build]
  # 编译命令
  cmd = "go build -o ./tmp/agentdm.exe ./cmd/server"
  # 运行产物
  bin = "tmp/agentdm.exe"
  # 加载 .env 文件中的环境变量
  dotenv = [".env"]
  # 监控的文件扩展名
  include_ext = ["go", "toml", "yaml"]
  # 排除目录
  exclude_dir = ["tmp", "bin", "vendor", "loadtest", "docs", "db"]
  # 排除文件
  exclude_file = ["_test.go"]
  # 编译延迟（毫秒），连续修改时等一下再编译
  delay = 1000
  # 发送中断信号后等待旧进程退出的时间
  kill_delay = 500

[log]
  # 显示日志时间戳
  time = true

[color]
  build = "yellow"
  runner = "green"
  main = "magenta"

[misc]
  # 退出时清理临时目录
  clean_on_exit = true
